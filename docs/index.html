<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marion — Cap. 6 & 7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- ── Sidebar ───────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">∂</span>
      <span class="logo-text">Marion</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="cronograma">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Cronograma
      </button>
      <button class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="formulas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
        Fórmulas
      </button>
    </nav>

    <div class="sidebar-progress">
      <div class="sp-label">Progresso geral</div>
      <div class="sp-ring-wrap">
        <canvas id="ringChart" width="100" height="100"></canvas>
        <div class="sp-ring-center">
          <span id="ringPct">0%</span>
        </div>
      </div>
      <div class="sp-sub" id="spSub">0 / 15 tópicos</div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────── -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">Cronograma de Estudos</div>
      <div class="topbar-actions">
        <button class="tb-btn" id="btnReset" title="Limpar progresso">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/></svg>
        </button>
        <div class="tb-badge cap6-badge">Cap. 6</div>
        <div class="tb-badge cap7-badge">Cap. 7</div>
      </div>
    </header>

    <!-- ═══ VIEW: CRONOGRAMA ══════════════════ -->
    <section class="view active" id="view-cronograma">

      <div class="filter-bar">
        <button class="filt active" data-f="all">Todos</button>
        <button class="filt cap6" data-f="cap6">Cap. 6</button>
        <button class="filt cap7" data-f="cap7">Cap. 7</button>
        <button class="filt" data-f="pending">Pendentes</button>
        <button class="filt done-filt" data-f="done">Concluídos</button>
        <div class="filt-sep"></div>
        <button class="filt diff-filt" data-f="easy">Fácil</button>
        <button class="filt diff-filt" data-f="medium">Médio</button>
        <button class="filt diff-filt" data-f="hard">Difícil</button>
      </div>

      <div class="chapter-grid" id="chapterGrid">
        <!-- built by JS -->
      </div>
    </section>

    <!-- ═══ VIEW: DASHBOARD ═══════════════════ -->
    <section class="view" id="view-dashboard">
      <div class="dash-grid">

        <div class="dash-card wide">
          <div class="dc-title">Progresso por Capítulo</div>
          <div class="chart-wrap"><canvas id="barChart"></canvas></div>
        </div>

        <div class="dash-card">
          <div class="dc-title">Distribuição de Dificuldade — Cap. 6</div>
          <div class="chart-wrap-sm"><canvas id="doughCap6"></canvas></div>
        </div>

        <div class="dash-card">
          <div class="dc-title">Distribuição de Dificuldade — Cap. 7</div>
          <div class="chart-wrap-sm"><canvas id="doughCap7"></canvas></div>
        </div>

        <div class="dash-card">
          <div class="dc-title">Horas Estimadas por Tópico</div>
          <div class="chart-wrap"><canvas id="hoursChart"></canvas></div>
        </div>

        <div class="dash-card">
          <div class="dc-title">Estatísticas</div>
          <div class="stats-list" id="statsList"></div>
        </div>

      </div>
    </section>

    <!-- ═══ VIEW: FÓRMULAS ════════════════════ -->
    <section class="view" id="view-formulas">
      <div class="formulas-grid" id="formulasGrid"></div>
    </section>

  </div><!-- /main-wrap -->

<script src="./js/app.js"></script>
</body>
</html>
